[workspace]
authors = ["Conor Bronsdon <cmbronsdon@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-markdown"
description = "CommonMark markdown parser and HTML renderer in pure Mojo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
test = "mojo run -I src test/test_markdown.mojo"
conformance = "mojo run -I src test/conformance.mojo"
fuzz = "mojo run -I src test/fuzz_runner.mojo"

[dependencies]
mojo = ">=1.0.0b3.dev2026070506,<2"
